plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
    // Add the Google services Gradle plugin
    id "com.google.gms.google-services"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode")
if (flutterVersionCode == null) {
    flutterVersionCode = "20"  // Zwiększona domyślna wartość, żeby uniknąć konfliktów
}

def flutterVersionName = localProperties.getProperty("flutter.versionName")
if (flutterVersionName == null) {
    flutterVersionName = "1.0.6"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}
// Sprawdzenie przed buildem release – wymagany key.properties z ścieżką do keystore
def hasValidSigning = keystorePropertiesFile.exists() &&
    keystoreProperties['storeFile'] != null &&
    keystoreProperties['storePassword'] != null &&
    keystoreProperties['keyPassword'] != null &&
    keystoreProperties['keyAlias'] != null

android {
    namespace = "com.backontv.app"
    compileSdk = 35
    ndkVersion = "26.1.10909125"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_21
        targetCompatibility = JavaVersion.VERSION_21
        coreLibraryDesugaringEnabled = true
    }

    kotlinOptions {
        jvmTarget = '21'
    }

    defaultConfig {
        applicationId = "com.backontv.app"
        minSdk = 21  // Zgodność z poprzednią wersją w Play; override Firebase w AndroidManifest
        targetSdk = 35  // Wymagane przez Google Play (minimum od 2024)
        versionCode = flutterVersionCode.toInteger()
        versionName = flutterVersionName
    }

    signingConfigs {
        release {
            if (hasValidSigning) {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
            }
        }
    }

    buildTypes {
        release {
            if (hasValidSigning) {
                signingConfig signingConfigs.release
            }
            // Gdy brak key.properties, signingConfig nie jest ustawiony – Gradle wymaga go dla bundleRelease
            // Włącz generowanie symboli debugowania dla natywnego kodu
            ndk {
                debugSymbolLevel 'FULL'
            }
            // Włącz minifikację z agresywnymi regułami ProGuard
            // Reguły są bardzo szczegółowe, żeby nie zepsuć powiadomień
            minifyEnabled true
            shrinkResources true
            // ProGuard rules dla flutter_local_notifications
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'
    
    // Import the Firebase BoM
    implementation platform('com.google.firebase:firebase-bom:34.6.0')
    
    // Firebase Analytics
    implementation 'com.google.firebase:firebase-analytics'
    
    // Firebase Messaging (already used in Flutter)
    implementation 'com.google.firebase:firebase-messaging'
}

flutter {
    source = "../.."
}

// Task do generowania pliku symbols.zip dla Google Play Console
// Google Play Console wymaga pliku symbols.zip z symbolami debugowania dla kodu natywnego
afterEvaluate {
    tasks.named('bundleRelease').configure {
        doLast {
            def symbolsOutputDir = file("${buildDir}/outputs/native-debug-symbols/release")
            symbolsOutputDir.mkdirs()
            
            // Lokalizacja bibliotek natywnych z symbolami
            def nativeLibsDir = file("${buildDir}/intermediates/merged_native_libs/release/mergeReleaseNativeLibs/out/lib")
            def symbolsZip = file("${symbolsOutputDir}/native-debug-symbols.zip")
            
            if (nativeLibsDir.exists() && nativeLibsDir.listFiles()?.length > 0) {
                println "📦 Znaleziono biblioteki natywne, generowanie symbols.zip..."
                
                // Utwórz archiwum ZIP z folderem lib/ zawierającym architektury
                ant.zip(destfile: symbolsZip.absolutePath, basedir: nativeLibsDir.parentFile, includes: "lib/**")
                
                println "✅ Wygenerowano plik symboli: ${symbolsZip.absolutePath}"
                println "📋 Lokalizacja: ${symbolsZip.absolutePath}"
                println "💡 Prześlij ten plik do Google Play Console w sekcji 'Symbole debugowania'"
            } else {
                println "⚠️ Nie znaleziono bibliotek natywnych w: ${nativeLibsDir.absolutePath}"
            }
        }
    }
}
